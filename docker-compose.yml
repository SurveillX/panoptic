name: panoptic

# Containerized Panoptic app stack — webhook, 9 workers, reclaimer,
# Search API, M10 operator UI, and M11 agent layer. Each worker is a
# separate service so restarts are surgical (tmux-dev.sh and this file
# are 1:1).
#
# Networking: host mode. The workers already talk to panoptic-store,
# panoptic-vllm, and panoptic-retrieval over localhost. Host mode keeps
# the existing .env URLs working unchanged. Each worker binds a unique
# /healthz port (8201-8208, 8210, 8100, 8400, 8500, 8600) so there are
# no collisions.
#
# Depends on: panoptic-store (postgres/qdrant/redis) + panoptic-vllm +
# panoptic-retrieval all running on the host. Bring those up first.
# Workers already tolerate transient connection failures (M4), so
# stack-level dependency ordering isn't enforced here.
#
# Dev iteration:
#   docker compose up -d             # start everything
#   docker compose logs -f caption   # follow one worker
#   docker compose restart caption   # after a code edit (bind-mount)
#   docker compose ps                # health status
#
# The code bind-mount means you don't rebuild the image for every edit.
# Rebuild only when pyproject.toml changes:
#   docker compose build
#   docker compose up -d

x-worker-base: &worker-base
  image: panoptic:latest
  restart: unless-stopped
  network_mode: host
  env_file: .env
  volumes:
    - .:/app:ro
    # /data/panoptic-store/images is the single shared image store;
    # every worker needs read access, image_caption_worker needs write.
    - /data/panoptic-store/images:/data/panoptic-store/images
  # Docker default log driver rotates to keep disk bounded. Without this
  # a busy worker can fill /var/lib/docker.
  logging:
    driver: json-file
    options:
      max-size: "50m"
      max-file: "5"

services:
  webhook:
    <<: *worker-base
    # Only one service declares `build:` so `docker compose build` produces
    # exactly one image — all other services reuse `panoptic:latest`.
    build: .
    container_name: panoptic-webhook
    command: python -m services.trailer_webhook.server
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8100/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  caption:
    <<: *worker-base
    container_name: panoptic-caption
    command: python -m services.panoptic_image_caption_worker.worker
    # Needs write access to the image tree — override the :ro default.
    volumes:
      - .:/app:ro
      - /data/panoptic-store/images:/data/panoptic-store/images
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8201/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  cap_embed:
    <<: *worker-base
    container_name: panoptic-cap-embed
    command: python -m services.panoptic_caption_embed_worker.worker
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8202/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  img_embed:
    <<: *worker-base
    container_name: panoptic-img-embed
    command: python -m services.panoptic_image_embed_worker.worker
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8206/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  summary:
    <<: *worker-base
    container_name: panoptic-summary
    command: python -m services.panoptic_summary_agent.worker
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8203/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  sum_embed:
    <<: *worker-base
    container_name: panoptic-sum-embed
    command: python -m services.panoptic_embedding_worker.worker
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8204/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  rollup:
    <<: *worker-base
    container_name: panoptic-rollup
    command: python -m services.panoptic_rollup_worker.worker
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8205/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  event_producer:
    <<: *worker-base
    container_name: panoptic-event-producer
    command: python -m services.panoptic_event_producer.worker
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8207/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  report_generator:
    <<: *worker-base
    container_name: panoptic-report-generator
    command: python -m services.panoptic_report_generator.worker
    # Needs write access to the reports tree.
    volumes:
      - .:/app:ro
      - /data/panoptic-store/images:/data/panoptic-store/images:ro
      - /data/panoptic-store/reports:/data/panoptic-store/reports
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8208/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  reclaimer:
    <<: *worker-base
    container_name: panoptic-reclaimer
    command: python -m services.panoptic_reclaimer.worker
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8210/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  agent:
    <<: *worker-base
    container_name: panoptic-agent
    command: python -m services.panoptic_agent.server
    # M11 — task-oriented agent layer over the Search API. Requires
    # ANTHROPIC_API_KEY in .env. Calls search_api over loopback HTTP;
    # the only external egress is api.anthropic.com.
    #
    # SECURITY NOTE — :8500 is internal-only, same trust boundary as
    # :8600 and :8400. No public tunnel without an auth layer first.
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8500/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  operator_ui:
    <<: *worker-base
    container_name: panoptic-operator-ui
    command: python -m services.panoptic_operator_ui.server
    # M10 — HTML surface for human operators. Calls search_api over
    # loopback HTTP via SEARCH_API_URL (host network mode; defaults to
    # http://localhost:8600).
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8400/healthz || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 20s

  search_api:
    <<: *worker-base
    container_name: panoptic-search-api
    command: python -m services.search_api.server
    # M10 added a read-only mount of the reports tree so the M9 viewer
    # endpoint (/v1/reports/{id}/view) can stream stored HTML inside an
    # iframe.
    #
    # SECURITY NOTE — the Search API (:8600) is an internal-only trust
    # boundary. It is not tunneled through Caddy/FRP today, and it must
    # not be until a stronger auth model lands. /v1/images/{id}.jpg and
    # /v1/reports/{id}/view both serve bytes from these mounted paths
    # with no per-user auth. See docs/OPERATOR_UI.md §Access and
    # docs/REPORTS.md §Access.
    volumes:
      - .:/app:ro
      - /data/panoptic-store/images:/data/panoptic-store/images:ro
      - /data/panoptic-store/reports:/data/panoptic-store/reports:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sSf http://localhost:8600/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 30s
